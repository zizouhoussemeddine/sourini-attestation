<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Attestation SOURINI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #ECEFF1; color: #212121; font-size: 14px; }
    #loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .spinner { width: 40px; height: 40px; border: 3px solid #ddd; border-top-color: #0A5C30; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="loading"><div class="spinner"></div></div>
<div id="app" style="display:none"></div>

<script>
const SUPABASE_URL = 'https://zbsnxhnqsbwhscrrpjyj.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpic254aG5xc2J3aHNjcnJwanlqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwOTc3MjgsImV4cCI6MjA4OTY3MzcyOH0.dgF2bokz33dalz6t2PpZAwvrM4M6cNxXXGIxgJFWvjk'; // ← remplace

async function load() {
  const params = new URLSearchParams(window.location.search);
  const numero = params.get('n');
  const params = new URLSearchParams(window.location.search);
const numero = params.get('n');
console.log('numero:', numero);
console.log('full URL:', window.location.href);
if (!numero) { showError('Numéro manquant'); return; }
  if (!numero) { showError('Numéro de contrat manquant'); return; }

  const res = await fetch(`${SUPABASE_URL}/rest/v1/contrats?numero=eq.${encodeURIComponent(numero)}&select=*,compagnies:compagnie_id(nom,code,telephone,email),offres:offre_id(libelle,type_couverture),vehicules:vehicule_id(marque,modele,immatriculation,annee,type_vehicule,numero_chassis)`, {
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
    }
  });

  const data = await res.json();
  if (!data || data.length === 0) { showError(numero); return; }
  render(data[0]);
}

function fmt(d) {
  const date = new Date(d);
  const mois = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
  return `${date.getDate()} ${mois[date.getMonth()]} ${date.getFullYear()}`;
}

function render(c) {
  const fin = new Date(c.date_fin);
  const jours = Math.ceil((fin - new Date()) / 86400000);
  const valide = jours > 0;
  const pct = Math.max(0, Math.min(100, (jours / 365) * 100)).toFixed(1);
  const comp = c.compagnies || {};
  const offre = c.offres || {};
  const veh = c.vehicules || {};
  const prime = Number(c.montant_prime).toLocaleString('en-US');

  document.title = `Attestation - ${c.numero}`;
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-top">
        <div class="header-brand">
          <div class="brand-logo">SRN</div>
          <div>
            <div class="brand-name">SOURINI</div>
            <div class="brand-sub">Plateforme d'Assurance Numérique</div>
          </div>
        </div>
        <div class="header-status">
          <div class="status-badge ${valide ? 'status-valide' : 'status-expire'}">${valide ? 'VALIDE' : 'EXPIRÉ'}</div>
          <div style="font-size:11px;opacity:0.7;margin-top:6px;">Attestation d'assurance automobile</div>
        </div>
      </div>
      <div class="header-bottom">
        République Algérienne Démocratique et Populaire — Document officiel — Généré le ${new Date().toLocaleDateString('fr-FR', {day:'2-digit',month:'long',year:'numeric'})}
      </div>
    </div>
    <div class="container">
      <div class="attest-box">
        <div class="attest-left">
          <div class="attest-label">Numéro d'attestation</div>
          <div class="attest-numero">${c.numero}</div>
          <div class="attest-date">Émis le ${fmt(c.created_at ?? c.date_debut)}</div>
        </div>
        <div class="attest-right">
          <div class="attest-statut" style="color:${valide?'#0A5C30':'#c0392b'}">${valide ? 'VALIDE' : 'EXPIRÉ'}</div>
          <div class="attest-days">${valide ? `${jours} jours restants` : 'Expiré'}</div>
        </div>
      </div>
      <div class="validity-wrap">
        <div class="validity-labels">
          <span>${fmt(c.date_debut)}</span>
          <span class="validity-center" style="color:${valide?'#0A5C30':'#c0392b'}">${valide ? `${jours} jours restants` : 'Expiré'}</span>
          <span>${fmt(c.date_fin)}</span>
        </div>
        <div class="validity-track"><div style="height:100%;border-radius:2px;background:${valide?'linear-gradient(90deg,#0A5C30,#2E7D32)':'#c0392b'};width:${pct}%"></div></div>
      </div>
      ${section('Compagnie d\'assurance', [
        ['Compagnie', comp.nom],['Code', comp.code],['Formule', offre.libelle],
        ['Type de couverture', offre.type_couverture],[`Prime annuelle`, `${prime} DZD`, true],
        ['Téléphone', comp.telephone],['Email', comp.email]
      ])}
      ${section('Véhicule assuré', [
        ['Marque', (veh.marque||'').toUpperCase()],['Modèle', veh.modele],
        ['Immatriculation', veh.immatriculation, true],['Année', veh.annee],
        ['Type', veh.type_vehicule],['N° Châssis', veh.numero_chassis||'---']
      ])}
      ${section('Période de couverture', [
        ['Date de début', fmt(c.date_debut)],['Date de fin', fmt(c.date_fin)],
        ['Durée totale', '365 jours'],['Jours restants', valide?`${jours} jours`:'Expiré', valide],
        ['Statut', valide?'VALIDE':'EXPIRÉ', true]
      ])}
      <a href="javascript:window.print()" class="print-btn">Imprimer / Enregistrer en PDF</a>
      <div class="legal">
        <div class="legal-title">Mention légale</div>
        Conformément à l'ordonnance n°95-07 du 25 janvier 1995 relative aux assurances, modifiée et complétée par la loi n°06-04.
        Ce document constitue une attestation d'assurance automobile valable sur l'ensemble du territoire de la République Algérienne.
        Toute falsification est passible de poursuites judiciaires.
      </div>
      <div class="footer">
        <span class="footer-logo">SOURINI</span> — Vérifié électroniquement — ${new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'})}<br>
        Ce document peut être présenté aux autorités comme justificatif d'assurance valide.
      </div>
    </div>`;
}

function section(title, rows) {
  return `<div class="section"><div class="section-header">${title}</div><table>
    ${rows.map(([l,v,h])=>`<tr><td class="td-label">${l}</td><td class="td-value${h?' highlight':''}">${v||'---'}</td></tr>`).join('')}
  </table></div>`;
}

function showError(numero) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('app').innerHTML = `<div style="display:flex;align-items:center;justify-content:center;min-height:100vh"><div style="background:white;border-radius:8px;padding:40px;text-align:center;max-width:400px"><h2 style="color:#c0392b;margin-bottom:8px">Contrat introuvable</h2><p style="color:#666">Le numéro <strong>${numero}</strong> n'existe pas.</p></div></div>`;
}

// CSS
document.head.insertAdjacentHTML('beforeend', `<style>
  .header{background:#0A5C30;color:white;padding:0}
  .header-top{display:flex;align-items:center;justify-content:space-between;padding:20px 28px;border-bottom:1px solid rgba(255,255,255,0.15)}
  .header-brand{display:flex;align-items:center;gap:14px}
  .brand-logo{width:44px;height:44px;background:white;border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;color:#0A5C30;letter-spacing:1px}
  .brand-name{font-size:20px;font-weight:800;letter-spacing:3px}
  .brand-sub{font-size:11px;opacity:0.7;margin-top:2px}
  .header-status{text-align:right}
  .status-badge{display:inline-block;padding:5px 14px;border-radius:3px;font-size:11px;font-weight:700;letter-spacing:1.5px;border:1px solid rgba(255,255,255,0.5)}
  .status-valide{background:rgba(255,255,255,0.15)}
  .status-expire{background:rgba(192,57,43,0.6)}
  .header-bottom{background:rgba(0,0,0,0.15);padding:10px 28px;font-size:11px;opacity:0.8}
  .container{max-width:680px;margin:0 auto;padding:24px 16px}
  .attest-box{background:white;border-radius:6px;padding:20px 24px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;border-top:3px solid #0A5C30;box-shadow:0 1px 4px rgba(0,0,0,0.08)}
  .attest-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px}
  .attest-numero{font-size:24px;font-weight:800;color:#0A5C30;letter-spacing:3px;font-family:monospace}
  .attest-date{font-size:11px;color:#aaa;margin-top:4px}
  .attest-right{text-align:right}
  .attest-statut{font-size:12px;font-weight:700;letter-spacing:1px}
  .attest-days{font-size:11px;color:#888;margin-top:4px}
  .validity-wrap{margin-bottom:20px}
  .validity-labels{display:flex;justify-content:space-between;font-size:11px;color:#888;margin-bottom:5px}
  .validity-center{font-weight:700}
  .validity-track{background:#ddd;border-radius:2px;height:6px;overflow:hidden}
  .section{background:white;border-radius:6px;margin-bottom:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
  .section-header{background:#F5F5F5;padding:10px 18px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:#0A5C30;border-bottom:1px solid #E0E0E0}
  table{width:100%;border-collapse:collapse}
  .td-label{padding:10px 18px;color:#777;font-size:13px;width:45%;border-bottom:1px solid #F5F5F5}
  .td-value{padding:10px 18px;font-weight:600;font-size:13px;border-bottom:1px solid #F5F5F5;text-align:right}
  .highlight{color:#0A5C30;font-weight:700}
  tr:last-child .td-label,tr:last-child .td-value{border-bottom:none}
  .print-btn{display:block;width:100%;padding:13px;background:#0A5C30;color:white;border:none;border-radius:5px;font-size:13px;font-weight:600;cursor:pointer;text-align:center;margin-bottom:14px;text-decoration:none}
  .legal{border:1px solid #CFD8DC;border-left:3px solid #0A5C30;background:white;border-radius:4px;padding:14px 16px;font-size:11px;color:#546E7A;line-height:1.8;margin-bottom:14px}
  .legal-title{font-weight:700;color:#37474F;margin-bottom:5px;font-size:11px;text-transform:uppercase;letter-spacing:0.5px}
  .footer{text-align:center;font-size:10px;color:#aaa;padding:12px 0 24px;border-top:1px solid #E0E0E0;margin-top:8px}
  .footer-logo{font-weight:800;color:#0A5C30;letter-spacing:2px}
  @media print{body{background:white}.print-btn{display:none}.container{padding:0;max-width:100%}.section{box-shadow:none;border:1px solid #ddd}.attest-box{box-shadow:none;border:1px solid #ddd;border-top:3px solid #0A5C30}}
</style>`);

load();
</script>
</body>
</html>
